<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
    <style>
        body { font-family: sans-serif; max-width: 300px; margin: 60px auto; }
        input, select { width: 100%; padding: 8px; margin: 6px 0 12px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
<h2>Регистрация</h2>
<p th:if="${errorMessage}" style="color:red" th:text="${errorMessage}"></p>
<p th:if="${successMessage}" style="color:green" th:text="${successMessage}"></p>

<form th:action="@{/register}" th:object="${user}" method="post">
    <label for="username">Логин:</label>
    <input type="text" id="username" th:field="*{username}" required>

    <label for="password">Пароль:</label>
    <input type="password" id="password" th:field="*{password}" required>

    <button type="submit">Зарегистрироваться</button>
</form>
<p>Уже есть аккаунт? <a th:href="@{/login}">Войти</a></p>
</body>
</html>
